name: benchmark

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  smoke-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run benchmark smoke
        run: python benchmark/run_benchmark.py --output benchmark/results/ci_benchmark.csv
