datasets:
  - name: CICIDS2017
    kind: mitre_format
    path: datasets/CICIDS2017/mitre_format.parquet
    split_group: cicids2017
    label_col: alert_type
    alt_label_cols:
      - tactic
      - campaign_id
    checkpoint: hgnn_checkpoints/network_v9_v3/network_it_best.pt
    seeds: [42, 43, 44]
    sample_size: 10000
    sample_seed: 142
    exclude_sample_seeds: [42]
    stratified_sample: true
    n_clusters: 15
    hdbscan_min_cluster_size: 5
    dbscan_eps: 0.3
    clustering_method: hdbscan
    engine_kwargs:
      device: cpu
      num_layers: 1
      hdbscan_min_cluster_size: 200
      hdbscan_pca_components: 8
      hdbscan_cluster_selection_epsilon: 0.15
      use_geometric_confidence: true
