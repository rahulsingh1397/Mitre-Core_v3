    alt_label_cols:
      - tactic
      - campaign_id
    checkpoint: hgnn_checkpoints/siem_supcon_v4/best.pt
    seeds: [42, 43, 44]
    sample_size: 5100
    sample_seed: 42
    stratified_sample: true
    n_clusters: 14
    hdbscan_min_cluster_size: 5
    dbscan_eps: 0.3
    clustering_method: hdbscan
    engine_kwargs:
      device: cpu
